<body style="margin: 0; background-color: #ffffff; overflow: hidden;">
  <script>
    // Professional Theme Detection Sync
    (function () {
      try {
        const theme = localStorage.getItem('barvido-ui-theme') || 'light';
        const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.body.style.backgroundColor = '#1c1c1e';
          document.body.classList.add('dark-mode');
          // Immediate splash theme sync
          const loader = document.getElementById('initial-loader');
          if (loader) loader.style.backgroundColor = '#1c1c1e';
        }
      } catch (e) {
        console.error('Theme detection failed', e);
      }
    })();
  </script>

  <div id="root"></div>

  <!-- Professional Splash Screen Phase 1 -->
  <div id="initial-loader">
    <div id="pattern-overlay"></div>

    <div style="position: relative; z-index: 10; display: flex; align-items: center; justify-content: center;">
      <div class="spinner-ring-outer"></div>
      <div class="spinner-ring-inner"></div>
      <div class="logo-box">
        <img src="https://res.cloudinary.com/dvjferxcm/image/upload/v1778148880/Alabaster_logo_1_oqitwk.png" class="logo-img"
          alt="Alabasta Logo" />
      </div>
    </div>

    <div class="branding-footer">
      ALABASTA
    </div>
  </div>

  <script>
    // Global function for React to trigger the fade out
    window.hideAppLoader = function () {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        loader.classList.add('loader-hidden');
        document.body.style.overflow = 'auto';
        setTimeout(() => {
          if (loader.parentNode) loader.parentNode.removeChild(loader);
        }, 600);
      }
    };

    // Alabasta Safety Protocol: If the app hasn't loaded in 10 seconds, hide the loader anyway
    setTimeout(() => {
      const loader = document.getElementById('initial-loader');
      if (loader && !loader.classList.contains('loader-hidden')) {
        console.warn('[ALABASTA] Safety timeout triggered: App taking too long to mount.');
        window.hideAppLoader();
      }
    }, 10000);
  </script>
  <script>
    // Alabasta Service Worker Protocol
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[ALABASTA PWA] Protocol Active'))
          .catch(err => console.error('[ALABASTA PWA] Initialization Failure', err));
      });
    }
  </script>
