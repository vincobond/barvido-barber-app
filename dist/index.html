    <style>
      /* Mobile Responsive Sizing & Pro Styles */
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes spin-reverse { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
      
      #initial-loader {
        position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; 
        align-items: center; justify-content: center; background-color: #ffffff; 
        transition: opacity 0.6s ease-in-out;
      }
      
      #pattern-overlay {
        position: absolute; inset: 0; z-index: 0; 
        background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, #f3f4f6 2px, #f3f4f6 4px); 
        opacity: 0.4; pointer-events: none;
      }

      .spinner-ring-outer {
        position: absolute; width: 130px; height: 130px; border-radius: 50%; 
        border: 2px solid transparent; border-top-color: #D85A30; 
        border-right-color: rgba(216, 90, 48, 0.2); animation: spin 3s linear infinite;
        opacity: 0.6;
      }

      .spinner-ring-inner {
        position: absolute; width: 100px; height: 100px; border-radius: 50%; 
        border: 3px solid transparent; border-top-color: #D85A30; 
        border-left-color: rgba(216, 90, 48, 0.3); animation: spin-reverse 2s linear infinite;
      }

      .logo-box {
        width: 80px; height: 80px; background-color: white; border-radius: 50%; 
        display: flex; align-items: center; justify-content: center; 
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08); position: relative; 
        z-index: 1; animation: pulse 3s ease-in-out infinite;
      }

      .logo-img { width: 55px; height: 55px; -o-object-fit: contain; object-fit: contain; }
      .loader-hidden { opacity: 0 !important; pointer-events: none !important; }

      @media (min-width: 640px) {
        .spinner-ring-outer { width: 190px; height: 190px; }
        .spinner-ring-inner { width: 150px; height: 150px; }
        .logo-box { width: 120px; height: 120px; }
        .logo-img { width: 90px; height: 90px; }
      }

      /* Dark Mode Styles */
      .dark-mode #initial-loader { background-color: #1c1c1e !important; }
      .dark-mode #pattern-overlay { 
        background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255, 255, 255, 0.02) 2px, rgba(255, 255, 255, 0.02) 4px) !important; 
      }
      .dark-mode .logo-box { background-color: #2a2a2c; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
    </style>
    <script type="module" crossorigin src="/assets/index-D7xXOCAL.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BslVkBo_.css">

  <body style="margin: 0; background-color: #ffffff; overflow: hidden;">
    <script>
      // Professional Theme Detection Sync
      (function() {
        try {
          const theme = localStorage.getItem('barvido-ui-theme') || 'light';
          const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.body.style.backgroundColor = '#1c1c1e';
            document.body.classList.add('dark-mode');
          }
        } catch (e) {
          console.error('Theme detection failed', e);
        }
      })();
    </script>

    <div id="root"></div>
    
    <!-- Professional Splash Screen Phase 1 -->
    <div id="initial-loader">
      <div id="pattern-overlay"></div>
      
      <div style="position: relative; z-index: 10; display: flex; align-items: center; justify-content: center;">
        <div class="spinner-ring-outer"></div>
        <div class="spinner-ring-inner"></div>
        <div class="logo-box">
          <img src="https://ik.imagekit.io/h3qzmviwv/Barvido/Alabaster%20logo%20(1).png" class="logo-img" alt="Alabaster Logo" />
        </div>
      </div>
    </div>

    <script>
      // Global function for React to trigger the fade out
      window.hideAppLoader = function() {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('loader-hidden');
          document.body.style.overflow = 'auto';
          setTimeout(() => {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 600);
        }
      };
    </script>
    <script>
      // Alabaster Service Worker Protocol
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[ALABASTER PWA] Protocol Active'))
            .catch(err => console.error('[ALABASTER PWA] Initialization Failure', err));
        });
      }
    </script>
  </body>
