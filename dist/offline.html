<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Offline | Alabaster</title>
    <style>
        :root {
            --barvido-primary: #1c1c1e;
            --barvido-accent: #D85A30;
            --barvido-text: #ffffff;
            --background: #1c1c1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--barvido-text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Diagonal Pattern Replicated */
        .pattern-overlay {
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255, 255, 255, 0.02) 2px, rgba(255, 255, 255, 0.02) 4px);
            z-index: 0;
            pointer-events: none;
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(216, 90, 48, 0.1) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 90%;
            width: 400px;
            padding: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sharp Icon Box */
        .icon-box {
            width: 100px;
            height: 100px;
            margin: 0 auto 32px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .icon-box svg {
            width: 48px;
            height: 48px;
            stroke: var(--barvido-accent);
            stroke-width: 1.5;
            fill: none;
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        p {
            font-size: 11px;
            color: #71717a;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Sharp Button */
        .retry-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--barvido-accent);
            color: white;
            padding: 18px 40px;
            text-decoration: none;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            border: none;
        }

        .retry-button:hover {
            background-color: #993C1D;
        }

        .retry-button:active {
            transform: scale(0.98);
        }

        .offline-tag {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.6em;
            color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="pattern-overlay"></div>
    <div class="ambient-glow"></div>

    <div class="container">
        <div class="icon-box">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
                <circle cx="12" cy="12" r="10" stroke-dasharray="2 4"/>
            </svg>
        </div>
        <h1>Connection Lost</h1>
        <p>Your session is currently interrupted. System integrity will restore automatically upon reconnection.</p>
        
        <button class="retry-button" onclick="window.location.reload()">
            Initialize Reconnect
        </button>
    </div>

    <div class="offline-tag">Offline Fallback</div>

    <script>
        // Check for connectivity periodically
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
