<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You are Offline | Alabasta</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1c1c1e;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .logo-box {
            width: 80px;
            height: 80px;
            background-color: #D85A30;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .logo-img {
            width: 48px;
            height: 48px;
            filter: brightness(0) invert(1);
        }
        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin: 0 0 8px 0;
        }
        p {
            color: #8e8e93;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            max-width: 250px;
            line-height: 1.6;
        }
        button {
            margin-top: 32px;
            background-color: white;
            color: black;
            border: none;
            padding: 16px 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="logo-box">
        <img src="https://ik.imagekit.io/h3qzmviwv/Barvido/66656518281.png" class="logo-img" alt="Alabasta Logo">
    </div>
    <h1>You are Offline</h1>
    <p>Check your internet connection and try again</p>
    <button onclick="window.location.reload()">Retry Connection</button>
</body>
</html>
